name: CI

# Reusable test + lint suite. Called by test.yml (PR/push feedback) and by
# docker-images.yml (gates the Fly deploy on green tests). Single source of truth —
# no duplicated job definitions.
on:
  workflow_call:

# Minimal permissions: read source only. No write access needed — artifact upload
# uses the Actions API (not git), which is allowed under contents: read.
permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pagespace_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      # Test on the Node version we ship. apps/web and apps/realtime run Node 24
      # in production (see their Dockerfiles), so the bulk of the suite runs here.
      # apps/processor is the exception: it ships on Node 22 and its Magika
      # (onnxruntime) content detection fails to load on Node 24 — so it is
      # excluded here and run separately below on its own Node 22 runtime.
      - name: Setup Node.js (24 — web/realtime runtime)
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build

      - name: Generate migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pagespace_test
        run: bun run db:generate

      - name: Setup test database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pagespace_test
        run: bun run --filter '@pagespace/db' db:migrate

      # apps/web is excluded here and run in the sharded `web-tests` job below —
      # its ~1500-module suite exceeds one runner's memory under v8 coverage.
      - name: Run tests with coverage (Node 24)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pagespace_test
        run: bunx turbo run test:coverage --filter='!@pagespace/processor' --filter='!web'

      # apps/processor ships on Node 22 (apps/processor/Dockerfile). Magika's
      # onnxruntime native bindings fail to initialize on Node 24, so test the
      # processor on the runtime it actually deploys to.
      - name: Setup Node.js (22 — processor runtime)
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '22'

      - name: Run processor tests with coverage (Node 22)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pagespace_test
        run: bunx turbo run test:coverage --filter='@pagespace/processor'

      # Backfill scripts have their own vitest context (scripts/vitest.config.ts)
      # and are not part of any workspace package, so the turbo test pipeline
      # never sees them. Scoped to backfill-* because the older tenant-* and
      # changelog-* suites in that config are broken independently of CI.
      - name: Run backfill script tests
        run: cd scripts && bunx vitest run __tests__/backfill-home-drives.test.ts __tests__/backfill-task-verb-tools.test.ts __tests__/backfill-trash-verb-tools.test.ts __tests__/backfill-legacy-ciphertext-reencrypt.test.ts __tests__/promote-admin.test.ts __tests__/setup-onprem-admin.test.ts

      - name: Coverage report
        if: always()
        run: node scripts/coverage-report.mjs

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-reports
          path: |
            apps/*/coverage/coverage-summary.json
            packages/*/coverage/coverage-summary.json
          retention-days: 30

  # apps/web is sharded across parallel standard runners: its suite executes
  # ~1500 real modules (the auth-barrel elimination made ~285 test files load
  # real modules instead of a barrel mock), and the v8 coverage remap of that
  # whole graph exceeds one 16 GB runner. Each shard runs ~1/N of the test files
  # on its own fresh runner, so the executed-coverage remap fits with headroom,
  # and each writes a `--reporter=blob` report. Thresholds are NOT enforced here
  # (a shard only covers 1/N of the code): the config skips them when
  # COVERAGE_SHARD is set. The `web-coverage` job merges the blobs and enforces
  # thresholds on the complete coverage. To scale, raise the shard count.
  web-tests:
    name: Web Tests (shard ${{ matrix.shard }}/3)
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pagespace_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Setup Node.js (24 — web runtime)
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build

      - name: Generate migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pagespace_test
        run: bun run db:generate

      - name: Setup test database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pagespace_test
        run: bun run --filter '@pagespace/db' db:migrate

      - name: Run web coverage shard ${{ matrix.shard }}/3
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pagespace_test
          COVERAGE_SHARD: '1'
        run: cd apps/web && bunx vitest run --coverage --reporter=blob --shard=${{ matrix.shard }}/3

      - name: Upload coverage blob
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: web-coverage-blob-${{ matrix.shard }}
          path: apps/web/.vitest-reports/
          retention-days: 1
          include-hidden-files: true

  # Merge the web shards' coverage blobs and enforce thresholds on the complete
  # coverage. This job only merges (no tests re-run) and combines already-
  # processed per-file coverage, so it is light and runs on a standard runner.
  web-coverage:
    name: Web Coverage (merge + thresholds)
    runs-on: ubuntu-latest
    needs: web-tests

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Setup Node.js (24 — web runtime)
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download coverage blobs
        uses: actions/download-artifact@v8
        with:
          path: apps/web/.vitest-reports/
          pattern: web-coverage-blob-*
          merge-multiple: true

      - name: Merge coverage and enforce thresholds
        run: cd apps/web && bunx vitest run --merge-reports --coverage

  lint:
    name: Lint & TypeScript Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ESLint
        run: bun run lint

      - name: Run TypeScript check
        run: bun run typecheck
