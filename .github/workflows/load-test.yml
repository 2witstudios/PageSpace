name: Load Test

on:
  schedule:
    # Weekly on Sundays at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      vus:
        description: 'Number of virtual users'
        required: false
        default: '50'
      duration:
        description: 'Test duration (e.g., 30s, 1m)'
        required: false
        default: '30s'

jobs:
  load-test:
    name: Auth Baseline Load Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pagespace_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build

      - name: Setup test database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pagespace_test
        run: bun --filter '@pagespace/db' run db:migrate

      - name: Start web server
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pagespace_test
          NODE_ENV: test
        run: |
          bun --filter 'web' run build
          bun --filter 'web' run start &

          # Health check loop - wait for server to be ready
          MAX_ATTEMPTS=30
          ATTEMPT=0
          echo "Waiting for server to be ready..."
          until curl -sf http://localhost:3000/api/health > /dev/null 2>&1; do
            ATTEMPT=$((ATTEMPT + 1))
            if [ $ATTEMPT -ge $MAX_ATTEMPTS ]; then
              echo "ERROR: Server failed to start after $MAX_ATTEMPTS attempts"
              exit 1
            fi
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS - server not ready, waiting..."
            sleep 2
          done
          echo "Server is ready!"

      - name: Seed load-test user
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pagespace_test
        run: bun tests/load/scripts/seed-load-user.ts

      - name: Run k6 load test
        env:
          K6_VUS: ${{ github.event.inputs.vus || '50' }}
          K6_DURATION: ${{ github.event.inputs.duration || '30s' }}
          BASE_URL: http://localhost:3000
        run: |
          mkdir -p tests/load/results
          docker run --rm \
            --network host \
            --workdir /scripts \
            -v "$PWD":/scripts \
            -e K6_VUS \
            -e K6_DURATION \
            -e BASE_URL \
            grafana/k6 run /scripts/tests/load/auth-baseline.k6.js

      - name: Upload load test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: load-test-results-${{ github.run_id }}
          path: tests/load/results/
          retention-days: 30

      - name: Cleanup load-test user
        if: always()
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pagespace_test
        run: bun tests/load/scripts/cleanup-load-user.ts
