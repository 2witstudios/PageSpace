name: Docker Images

on:
  workflow_dispatch:
  push:
    branches: [master]
    tags: ['v*.*.*']
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'docker/**'
      - 'bun.lock'
      - '.github/workflows/docker-images.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/2witstudios/pagespace

# Serialize deploys: back-to-back merges to master queue instead of racing on the
# mutable :latest tag (the slower run would otherwise win and land prod on an older
# commit). Queue rather than cancel so an in-flight migration/deploy is never interrupted.
concurrency:
  group: deploy-fly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  build-and-push:
    name: Build & Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: web
            dockerfile: apps/web/Dockerfile
            context: .
            # Realtime is same-origin: Caddy routes pagespace.ai/socket.io/* → realtime.
            # NEXT_PUBLIC_* are baked at build time — the fly.web.toml runtime [env] cannot
            # override them, so the storage cap MUST match (1024), not the old VPS-era 20.
            build_args: |
              NEXT_PUBLIC_APP_URL=https://pagespace.ai
              NEXT_PUBLIC_REALTIME_URL=https://pagespace.ai
              NEXT_PUBLIC_ADMIN_APP_URL=https://admin.pagespace.ai
              NEXT_PUBLIC_STORAGE_MAX_FILE_SIZE_MB=1024
              NEXT_PUBLIC_GOOGLE_OAUTH_CLIENT_ID=636969838408-p2v0ov9j4klle7pj9uedo8339tikl2ii.apps.googleusercontent.com
              NEXT_PUBLIC_GOOGLE_OAUTH_IOS_CLIENT_ID=636969838408-0jbv7gq9793m0uchdrjlr8v1k6m5lh59.apps.googleusercontent.com
              NEXT_PUBLIC_PUBLISH_EDGE_IPV4=137.66.4.209
              NEXT_PUBLIC_PUBLISH_EDGE_IPV6=2a09:8280:1::118:198f:0
              NEXT_PUBLIC_PUBLISH_EDGE_CNAME_TARGET=pagespace-proxy.fly.dev
          - service: migrate
            dockerfile: apps/web/Dockerfile.migrate
            context: .
            build_args: ""
          - service: realtime
            dockerfile: apps/realtime/Dockerfile
            context: .
            build_args: ""
          - service: processor
            dockerfile: apps/processor/Dockerfile
            context: .
            build_args: ""
          - service: cron
            dockerfile: docker/cron/Dockerfile
            context: docker/cron
            build_args: ""
          - service: admin
            dockerfile: apps/admin/Dockerfile
            context: .
            build_args: |
              NEXT_PUBLIC_WEB_APP_URL=https://pagespace.ai
          - service: marketing
            dockerfile: apps/marketing/Dockerfile
            context: .
            build_args: |
              NEXT_PUBLIC_MARKETING_URL=https://pagespace.ai
              NEXT_PUBLIC_APP_URL=https://pagespace.ai
              NEXT_PUBLIC_COOKIE_DOMAIN=.pagespace.ai
              NEXT_PUBLIC_GOOGLE_CLIENT_ID=636969838408-p2v0ov9j4klle7pj9uedo8339tikl2ii.apps.googleusercontent.com
              NEXT_PUBLIC_ENABLE_ONE_TAP=true

    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
            type=semver,pattern=v{{version}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Secrets cannot be referenced in strategy.matrix — inject them here
          # for the web service only; empty strings are ignored by buildx.
          build-args: |
            ${{ matrix.build_args }}
            ${{ matrix.service == 'web' && format('NEXT_PUBLIC_SENTRY_DSN={0}', secrets.NEXT_PUBLIC_SENTRY_DSN) || '' }}
            ${{ matrix.service == 'web' && format('SENTRY_AUTH_TOKEN={0}', secrets.SENTRY_AUTH_TOKEN) || '' }}
            ${{ matrix.service == 'web' && format('SENTRY_ORG={0}', secrets.SENTRY_ORG) || '' }}
            ${{ matrix.service == 'web' && format('SENTRY_PROJECT={0}', secrets.SENTRY_PROJECT) || '' }}

  deploy-fly:
    name: Deploy to Fly.io
    needs: [build-and-push, ci]
    runs-on: ubuntu-latest
    environment: fly-production
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Log in to Fly registry
        run: flyctl auth docker
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run migrations
        run: |
          docker pull ghcr.io/2witstudios/pagespace-migrate:latest
          docker tag ghcr.io/2witstudios/pagespace-migrate:latest registry.fly.io/pagespace-web:migrate
          docker push registry.fly.io/pagespace-web:migrate

          # Migrations exit before reaching "started" state, so flyctl errors with
          # "failed to reach desired start state" after 60s. This is expected.
          # Use || true so bash -e doesn't exit; we verify success via machine state below.
          flyctl machine run registry.fly.io/pagespace-web:migrate \
            --app pagespace-web \
            --region iad \
            --restart no \
            2>&1 | tee /tmp/machine_output.txt || true

          MACHINE_ID=$(grep -oP 'Machine ID: \K[0-9a-f]+' /tmp/machine_output.txt | head -1)
          if [ -z "$MACHINE_ID" ]; then
            echo "ERROR: could not parse machine ID from flyctl output"
            cat /tmp/machine_output.txt
            exit 1
          fi
          echo "Migration machine: $MACHINE_ID"

          # Fail on any unexpected error (not the expected "desired start state" one)
          if grep -q "Error:" /tmp/machine_output.txt && ! grep -q "desired start state" /tmp/machine_output.txt; then
            echo "ERROR: unexpected flyctl error:"
            grep "Error:" /tmp/machine_output.txt
            flyctl machine destroy "$MACHINE_ID" --app pagespace-web --force 2>/dev/null || true
            exit 1
          fi

          # Poll for terminal state. A machine that exits 0 → "stopped"; non-zero → "failed".
          # flyctl machine wait --state stopped hangs the full timeout when migrations fail
          # because the machine is already in "failed" state, not "stopped". Poll both.
          TIMEOUT=900
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            # flyctl machine status has no --json flag (outputs a formatted table regardless).
            # Use the Fly.io Machines REST API directly for reliable JSON state polling.
            HTTP_CODE=$(curl -s -o /tmp/fly_machine.json -w "%{http_code}" \
              -H "Authorization: Bearer $FLY_API_TOKEN" \
              "https://api.machines.dev/v1/apps/pagespace-web/machines/$MACHINE_ID")
            if [ "$HTTP_CODE" = "200" ]; then
              STATE=$(jq -r '.state // "unknown"' /tmp/fly_machine.json 2>/dev/null || echo "unknown")
            elif [ "$HTTP_CODE" = "404" ]; then
              echo "ERROR: migration machine $MACHINE_ID not found (unexpectedly destroyed)"
              exit 1
            else
              STATE="unknown"
            fi
            echo "  [${ELAPSED}s] state: $STATE"
            if [ "$STATE" = "stopped" ]; then
              break
            elif [ "$STATE" = "failed" ] || [ "$STATE" = "destroyed" ]; then
              echo "ERROR: migration machine reached $STATE state (migrations failed)"
              flyctl machine logs "$MACHINE_ID" --app pagespace-web 2>/dev/null || true
              flyctl machine destroy "$MACHINE_ID" --app pagespace-web --force 2>/dev/null || true
              exit 1
            fi
            sleep 10
            ELAPSED=$((ELAPSED + 10))
          done

          if [ $ELAPSED -ge $TIMEOUT ]; then
            echo "ERROR: timed out after ${TIMEOUT}s waiting for migration machine"
            flyctl machine destroy "$MACHINE_ID" --app pagespace-web --force 2>/dev/null || true
            exit 1
          fi

          flyctl machine destroy "$MACHINE_ID" --app pagespace-web --force
          echo "Migrations complete"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_NO_UPDATE_CHECK: "true"

      - name: Deploy web
        run: |
          docker pull ghcr.io/2witstudios/pagespace-web:latest
          docker tag ghcr.io/2witstudios/pagespace-web:latest registry.fly.io/pagespace-web:latest
          docker push registry.fly.io/pagespace-web:latest
          flyctl deploy --app pagespace-web --image registry.fly.io/pagespace-web:latest --wait-timeout 300
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy realtime
        run: |
          docker pull ghcr.io/2witstudios/pagespace-realtime:latest
          docker tag ghcr.io/2witstudios/pagespace-realtime:latest registry.fly.io/pagespace-realtime:latest
          docker push registry.fly.io/pagespace-realtime:latest
          flyctl deploy --app pagespace-realtime --image registry.fly.io/pagespace-realtime:latest --wait-timeout 300
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy processor
        run: |
          docker pull ghcr.io/2witstudios/pagespace-processor:latest
          docker tag ghcr.io/2witstudios/pagespace-processor:latest registry.fly.io/pagespace-processor:latest
          docker push registry.fly.io/pagespace-processor:latest
          # strategy=immediate (fly.processor.toml): restarts in-place, no two-phase rolling swap.
          # flyctl deploy with immediate strategy completes in ~3s (updates config + restart) and
          # returns "good state" only after the machine is up. No post-deploy machine wait needed —
          # flyctl machine wait against an immediate-strategy machine hits a transient "replacing"
          # state and produces false-negative CI failures.
          flyctl deploy --app pagespace-processor --image registry.fly.io/pagespace-processor:latest --wait-timeout 120
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy admin
        run: |
          docker pull ghcr.io/2witstudios/pagespace-admin:latest
          docker tag ghcr.io/2witstudios/pagespace-admin:latest registry.fly.io/pagespace-admin:latest
          docker push registry.fly.io/pagespace-admin:latest
          flyctl deploy --app pagespace-admin --image registry.fly.io/pagespace-admin:latest --wait-timeout 300
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy cron
        run: |
          docker pull ghcr.io/2witstudios/pagespace-cron:latest
          docker tag ghcr.io/2witstudios/pagespace-cron:latest registry.fly.io/pagespace-cron:latest
          docker push registry.fly.io/pagespace-cron:latest
          flyctl deploy --app pagespace-cron --image registry.fly.io/pagespace-cron:latest --wait-timeout 300

          # Cron is a SINGLETON scheduler: exactly one machine must run, or scheduled jobs
          # (memory/pulse crons) double-fire. Reconcile to one machine, ensure it's started,
          # then VERIFY the invariant — if it can't be enforced, fail the deploy rather than
          # silently leave duplicate (double-firing) or stopped (non-firing) cron machines.
          flyctl scale count 1 --app pagespace-cron --yes
          for id in $(flyctl machines list --app pagespace-cron --json | jq -r '.[].id'); do
            flyctl machine start "$id" --app pagespace-cron 2>/dev/null || true
          done
          crons=$(flyctl machines list --app pagespace-cron --json)
          count=$(echo "$crons" | jq 'length')
          started=$(echo "$crons" | jq '[.[] | select(.state == "started")] | length')
          if [ "$count" -ne 1 ] || [ "$started" -ne 1 ]; then
            echo "ERROR: cron must be exactly 1 started machine (count=$count started=$started)"
            echo "$crons" | jq -r '.[] | "  \(.id) \(.state)"'
            exit 1
          fi
          echo "cron: 1/1 machine started"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy marketing
        run: |
          docker pull ghcr.io/2witstudios/pagespace-marketing:latest
          docker tag ghcr.io/2witstudios/pagespace-marketing:latest registry.fly.io/pagespace-marketing:latest
          docker push registry.fly.io/pagespace-marketing:latest
          flyctl deploy --app pagespace-marketing --image registry.fly.io/pagespace-marketing:latest --wait-timeout 300
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
