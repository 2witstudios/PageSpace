name: Docker Images

on:
  workflow_dispatch:
  push:
    branches: [master]
    tags: ['v*.*.*']
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'docker/**'
      - 'bun.lock'
      - '.github/workflows/docker-images.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/2witstudios/pagespace

# Serialize deploys: back-to-back merges to master queue instead of racing each other
# (the slower run would otherwise finish last and clobber a newer deploy with an older
# commit). Queue rather than cancel so an in-flight migration/deploy is never interrupted.
concurrency:
  group: deploy-fly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  build-and-push:
    name: Build & Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: web
            dockerfile: apps/web/Dockerfile
            context: .
            # Realtime is same-origin: Caddy routes pagespace.ai/socket.io/* → realtime.
            # NEXT_PUBLIC_* are baked at build time — the fly.web.toml runtime [env] cannot
            # override them, so the storage cap MUST match (1024), not the old VPS-era 20.
            build_args: |
              NEXT_PUBLIC_APP_URL=https://pagespace.ai
              NEXT_PUBLIC_REALTIME_URL=https://pagespace.ai
              NEXT_PUBLIC_ADMIN_APP_URL=https://admin.pagespace.ai
              NEXT_PUBLIC_STORAGE_MAX_FILE_SIZE_MB=1024
              NEXT_PUBLIC_GOOGLE_OAUTH_CLIENT_ID=636969838408-p2v0ov9j4klle7pj9uedo8339tikl2ii.apps.googleusercontent.com
              NEXT_PUBLIC_GOOGLE_OAUTH_IOS_CLIENT_ID=636969838408-0jbv7gq9793m0uchdrjlr8v1k6m5lh59.apps.googleusercontent.com
              NEXT_PUBLIC_PUBLISH_EDGE_IPV4=137.66.4.209
              NEXT_PUBLIC_PUBLISH_EDGE_IPV6=2a09:8280:1::118:198f:0
              NEXT_PUBLIC_PUBLISH_EDGE_CNAME_TARGET=pagespace-proxy.fly.dev
              NEXT_PUBLIC_COOKIE_DOMAIN=.pagespace.ai
          - service: migrate
            dockerfile: apps/web/Dockerfile.migrate
            context: .
            build_args: ""
          - service: realtime
            dockerfile: apps/realtime/Dockerfile
            context: .
            build_args: ""
          - service: processor
            dockerfile: apps/processor/Dockerfile
            context: .
            build_args: ""
          - service: cron
            dockerfile: docker/cron/Dockerfile
            context: docker/cron
            build_args: ""
          - service: admin
            dockerfile: apps/admin/Dockerfile
            context: .
            build_args: |
              NEXT_PUBLIC_WEB_APP_URL=https://pagespace.ai
          - service: marketing
            dockerfile: apps/marketing/Dockerfile
            context: .
            build_args: |
              NEXT_PUBLIC_MARKETING_URL=https://pagespace.ai
              NEXT_PUBLIC_APP_URL=https://pagespace.ai
              NEXT_PUBLIC_COOKIE_DOMAIN=.pagespace.ai
              NEXT_PUBLIC_GOOGLE_CLIENT_ID=636969838408-p2v0ov9j4klle7pj9uedo8339tikl2ii.apps.googleusercontent.com
              NEXT_PUBLIC_ENABLE_ONE_TAP=true

    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
            type=semver,pattern=v{{version}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Secrets cannot be referenced in strategy.matrix — inject them here
          # for the web service only; empty strings are ignored by buildx.
          build-args: |
            ${{ matrix.build_args }}
            ${{ matrix.service == 'web' && format('NEXT_PUBLIC_SENTRY_DSN={0}', secrets.NEXT_PUBLIC_SENTRY_DSN) || '' }}
            ${{ matrix.service == 'web' && format('SENTRY_AUTH_TOKEN={0}', secrets.SENTRY_AUTH_TOKEN) || '' }}
            ${{ matrix.service == 'web' && format('SENTRY_ORG={0}', secrets.SENTRY_ORG) || '' }}
            ${{ matrix.service == 'web' && format('SENTRY_PROJECT={0}', secrets.SENTRY_PROJECT) || '' }}

  deploy-staging:
    name: Deploy to Staging
    needs: [build-and-push, ci]
    runs-on: ubuntu-latest
    environment: fly-staging
    if: github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Log in to Fly registry
        run: flyctl auth docker
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Same sha-pinned tag that smoke-test verifies and deploy-fly (prod) later
      # promotes — staging and prod always run the exact same artifact.
      - name: Run staging migrations
        run: |
          scripts/deploy/run-fly-migration.sh pagespace-web-staging \
            ghcr.io/2witstudios/pagespace-migrate "sha-${GITHUB_SHA::7}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_NO_UPDATE_CHECK: "true"

      - name: Deploy web to staging
        run: |
          scripts/deploy/deploy-fly-service.sh pagespace-web-staging \
            ghcr.io/2witstudios/pagespace-web "sha-${GITHUB_SHA::7}" 180
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  smoke-test:
    name: Smoke Test Staging
    needs: deploy-staging
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Poll /api/health until healthy
        run: scripts/deploy/smoke-test.sh https://pagespace-web-staging.fly.dev

  deploy-fly:
    name: Deploy to Fly.io (Production)
    needs: [build-and-push, ci, smoke-test]
    runs-on: ubuntu-latest
    environment: fly-production
    if: github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Log in to Fly registry
        run: flyctl auth docker
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Promotes the EXACT tag that smoke-test just verified against staging —
      # never :latest, which could have moved since the build.
      - name: Run migrations
        run: |
          scripts/deploy/run-fly-migration.sh pagespace-web \
            ghcr.io/2witstudios/pagespace-migrate "sha-${GITHUB_SHA::7}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_NO_UPDATE_CHECK: "true"

      # Admin PG (trust plane, #890): mirrors the main migration machine but runs
      # db:migrate:admin. The machine runs in the pagespace-web app, BUT it must
      # not use that app's runtime ADMIN_DATABASE_URL secret — that is the
      # least-privilege admin_app LOGIN (Phase 2), which cannot run DDL. The
      # OWNER connection string lives ONLY in the ADMIN_DATABASE_URL_MIGRATE
      # GitHub secret and is passed to the one-shot machine via --env, so owner
      # credentials never sit in any Fly app's runtime secrets (migrate-admin.ts
      # prefers ADMIN_DATABASE_URL_MIGRATE over the inherited runtime URL).
      # GATED on the ADMIN_DB_MIGRATIONS_ENABLED repo variable: deploys must not break
      # before the Fly pagespace-db-admin instance is provisioned. Ops flips the
      # variable to 'true' after provisioning — see the Phase 6 runbook (issue #890)
      # and the Fly secret matrix in infrastructure/UPGRADE.md (Phase 2).
      - name: Run admin migrations
        if: ${{ vars.ADMIN_DB_MIGRATIONS_ENABLED == 'true' }}
        run: |
          # Fail fast: without the dedicated migrate URL the machine would fall
          # back to the app's runtime login and fail with permission errors deep
          # inside the migration — surface the misconfiguration by name instead.
          if [ -z "$ADMIN_DATABASE_URL_MIGRATE" ]; then
            echo "ERROR: ADMIN_DATABASE_URL_MIGRATE secret is not set."
            echo "ADMIN_DB_MIGRATIONS_ENABLED=true requires the dedicated owner migrate URL"
            echo "(see infrastructure/UPGRADE.md, Phase 2 Fly secret matrix)."
            exit 1
          fi

          scripts/deploy/run-fly-migration.sh pagespace-web \
            ghcr.io/2witstudios/pagespace-migrate "sha-${GITHUB_SHA::7}" \
            -- --env ADMIN_DATABASE_URL_MIGRATE="$ADMIN_DATABASE_URL_MIGRATE" bun run db:migrate:admin
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_NO_UPDATE_CHECK: "true"
          ADMIN_DATABASE_URL_MIGRATE: ${{ secrets.ADMIN_DATABASE_URL_MIGRATE }}

      - name: Deploy web
        run: |
          scripts/deploy/deploy-fly-service.sh pagespace-web \
            ghcr.io/2witstudios/pagespace-web "sha-${GITHUB_SHA::7}" 300
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy realtime
        run: |
          scripts/deploy/deploy-fly-service.sh pagespace-realtime \
            ghcr.io/2witstudios/pagespace-realtime "sha-${GITHUB_SHA::7}" 300
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy processor
        # strategy=immediate (fly.processor.toml): restarts in-place, no two-phase rolling swap.
        # flyctl deploy with immediate strategy completes in ~3s (updates config + restart) and
        # returns "good state" only after the machine is up. No post-deploy machine wait needed —
        # flyctl machine wait against an immediate-strategy machine hits a transient "replacing"
        # state and produces false-negative CI failures.
        run: |
          scripts/deploy/deploy-fly-service.sh pagespace-processor \
            ghcr.io/2witstudios/pagespace-processor "sha-${GITHUB_SHA::7}" 120
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy admin
        run: |
          scripts/deploy/deploy-fly-service.sh pagespace-admin \
            ghcr.io/2witstudios/pagespace-admin "sha-${GITHUB_SHA::7}" 300
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy cron
        run: |
          scripts/deploy/deploy-fly-service.sh pagespace-cron \
            ghcr.io/2witstudios/pagespace-cron "sha-${GITHUB_SHA::7}" 300

          # Cron is a SINGLETON scheduler: exactly one machine must run, or scheduled jobs
          # (memory/pulse crons) double-fire. Reconcile to one machine, ensure it's started,
          # then VERIFY the invariant — if it can't be enforced, fail the deploy rather than
          # silently leave duplicate (double-firing) or stopped (non-firing) cron machines.
          flyctl scale count 1 --app pagespace-cron --yes
          for id in $(flyctl machines list --app pagespace-cron --json | jq -r '.[].id'); do
            flyctl machine start "$id" --app pagespace-cron 2>/dev/null || true
          done
          crons=$(flyctl machines list --app pagespace-cron --json)
          count=$(echo "$crons" | jq 'length')
          started=$(echo "$crons" | jq '[.[] | select(.state == "started")] | length')
          if [ "$count" -ne 1 ] || [ "$started" -ne 1 ]; then
            echo "ERROR: cron must be exactly 1 started machine (count=$count started=$started)"
            echo "$crons" | jq -r '.[] | "  \(.id) \(.state)"'
            exit 1
          fi
          echo "cron: 1/1 machine started"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy marketing
        run: |
          scripts/deploy/deploy-fly-service.sh pagespace-marketing \
            ghcr.io/2witstudios/pagespace-marketing "sha-${GITHUB_SHA::7}" 300
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
