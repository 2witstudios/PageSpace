name: Docker Images

on:
  push:
    branches: [master]
    tags: ['v*.*.*']
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'docker/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/docker-images.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/2witstudios/pagespace

jobs:
  build-and-push:
    name: Build & Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: web
            dockerfile: apps/web/Dockerfile
            context: .
            build_args: |
              NEXT_PUBLIC_APP_URL=https://pagespace.ai
              NEXT_PUBLIC_REALTIME_URL=https://pagespace.ai
              NEXT_PUBLIC_STORAGE_MAX_FILE_SIZE_MB=20
              NEXT_PUBLIC_GOOGLE_OAUTH_CLIENT_ID=636969838408-p2v0ov9j4klle7pj9uedo8339tikl2ii.apps.googleusercontent.com
              NEXT_PUBLIC_GOOGLE_OAUTH_IOS_CLIENT_ID=636969838408-0jbv7gq9793m0uchdrjlr8v1k6m5lh59.apps.googleusercontent.com
          - service: marketing
            dockerfile: apps/marketing/Dockerfile
            context: .
            build_args: |
              NEXT_PUBLIC_MARKETING_URL=https://pagespace.ai
              NEXT_PUBLIC_APP_URL=https://pagespace.ai
              NEXT_PUBLIC_COOKIE_DOMAIN=.pagespace.ai
              NEXT_PUBLIC_GOOGLE_CLIENT_ID=636969838408-p2v0ov9j4klle7pj9uedo8339tikl2ii.apps.googleusercontent.com
              NEXT_PUBLIC_ENABLE_ONE_TAP=true
          - service: migrate
            dockerfile: apps/web/Dockerfile.migrate
            context: .
            build_args: ""
          - service: realtime
            dockerfile: apps/realtime/Dockerfile
            context: .
            build_args: ""
          - service: processor
            dockerfile: apps/processor/Dockerfile
            context: .
            build_args: ""
          - service: cron
            dockerfile: docker/cron/Dockerfile
            context: docker/cron
            build_args: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
            type=semver,pattern=v{{version}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: ${{ matrix.build_args }}
