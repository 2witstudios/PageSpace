# Parameterized tenant stack for PageSpace multi-tenant deployment.
# Each tenant gets an isolated instance via `docker compose -p ps-{slug}`.
#
# All variables are supplied via --env-file at runtime:
#   docker compose -p ps-acme -f docker-compose.tenant.yml --env-file /data/tenants/acme/.env up -d

services:
  postgres:
    image: postgres:17.5-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pagespace}
      POSTGRES_USER: ${POSTGRES_USER:-pagespace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pagespace} -d ${POSTGRES_DB:-pagespace}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 200M
    networks:
      - internal

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 160M
    networks:
      - internal

  redis-sessions:
    image: redis:7.4-alpine
    restart: unless-stopped
    volumes:
      - redis_sessions_data:/data
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 64mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 96M
    networks:
      - internal

  migrate:
    image: ghcr.io/2witstudios/pagespace-migrate:${IMAGE_TAG:-latest}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pagespace}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pagespace}
      PNPM_HOME: /usr/local/bin
    command: >
      sh -c "
        echo 'Starting database migrations...' &&
        pnpm run db:migrate &&
        echo 'Migrations complete'
      "
    networks:
      - internal

  processor-permissions:
    image: ghcr.io/2witstudios/pagespace-processor:${IMAGE_TAG:-latest}
    user: root
    volumes:
      - file_storage:/data/files
      - cache_storage:/data/cache
    command: |
      sh -c '
        echo "Fixing volume permissions..."
        chown -R 1000:1000 /data/files /data/cache
        echo "Permissions fixed successfully"
      '
    restart: "no"
    networks:
      - internal

  processor:
    image: ghcr.io/2witstudios/pagespace-processor:${IMAGE_TAG:-latest}
    restart: unless-stopped
    expose:
      - "3003"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      processor-permissions:
        condition: service_completed_successfully
      redis-sessions:
        condition: service_healthy
    volumes:
      - file_storage:/data/files
      - cache_storage:/data/cache
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pagespace}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pagespace}
      FILE_STORAGE_PATH: /data/files
      CACHE_PATH: /data/cache
      PORT: "3003"
      NODE_OPTIONS: --max-old-space-size=1024
      ENABLE_OCR: ${ENABLE_OCR:-false}
      ENABLE_EXTERNAL_OCR: ${ENABLE_EXTERNAL_OCR:-false}
      GOOGLE_AI_DEFAULT_API_KEY: ${GOOGLE_AI_DEFAULT_API_KEY:-}
      STORAGE_DEFAULT_QUOTA_MB: ${STORAGE_DEFAULT_QUOTA_MB:-500}
      STORAGE_MAX_FILE_SIZE_MB: ${STORAGE_MAX_FILE_SIZE_MB:-20}
      STORAGE_MAX_CONCURRENT_UPLOADS: ${STORAGE_MAX_CONCURRENT_UPLOADS:-5}
      STORAGE_MIN_FREE_MEMORY_MB: ${STORAGE_MIN_FREE_MEMORY_MB:-500}
      STORAGE_ENABLE_QUOTAS: ${STORAGE_ENABLE_QUOTAS:-true}
      PROCESSOR_AUTH_REQUIRED: ${PROCESSOR_AUTH_REQUIRED:-true}
      PROCESSOR_UPLOAD_RATE_LIMIT: ${PROCESSOR_UPLOAD_RATE_LIMIT:-100}
      PROCESSOR_UPLOAD_RATE_WINDOW: ${PROCESSOR_UPLOAD_RATE_WINDOW:-3600}
      REDIS_SESSION_URL: redis://:${REDIS_PASSWORD}@redis-sessions:6379
      REDIS_RATE_LIMIT_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3003/health', (r) => {r.statusCode === 200 ? process.exit(0) : process.exit(1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1280M
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    security_opt:
      - no-new-privileges:true
    networks:
      - internal

  web:
    image: ghcr.io/2witstudios/pagespace-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      processor:
        condition: service_healthy
      redis:
        condition: service_healthy
      redis-sessions:
        condition: service_healthy
    volumes:
      - file_storage:/app/storage
    environment:
      DEPLOYMENT_MODE: tenant
      NEXT_PUBLIC_DEPLOYMENT_MODE: tenant
      DATABASE_URL: postgresql://${POSTGRES_USER:-pagespace}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pagespace}
      FILE_STORAGE_PATH: /app/storage
      PROCESSOR_URL: http://processor:3003
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REDIS_SESSION_URL: redis://:${REDIS_PASSWORD}@redis-sessions:6379
      REDIS_RATE_LIMIT_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CRON_SECRET: ${CRON_SECRET}
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NODE_OPTIONS: --max-old-space-size=640
      WEB_APP_URL: ${WEB_APP_URL}
      CORS_ORIGIN: ${CORS_ORIGIN}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER:-pagespace}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-pagespace-users}
      CSRF_SECRET: ${CSRF_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      REALTIME_BROADCAST_SECRET: ${REALTIME_BROADCAST_SECRET}
      GOOGLE_AI_DEFAULT_API_KEY: ${GOOGLE_AI_DEFAULT_API_KEY:-}
      STORAGE_DEFAULT_QUOTA_MB: ${STORAGE_DEFAULT_QUOTA_MB:-500}
      STORAGE_MAX_FILE_SIZE_MB: ${STORAGE_MAX_FILE_SIZE_MB:-20}
      STORAGE_MAX_CONCURRENT_UPLOADS: ${STORAGE_MAX_CONCURRENT_UPLOADS:-5}
      STORAGE_MIN_FREE_MEMORY_MB: ${STORAGE_MIN_FREE_MEMORY_MB:-500}
      STORAGE_ENABLE_QUOTAS: ${STORAGE_ENABLE_QUOTAS:-true}
      NEXT_PUBLIC_STORAGE_MAX_FILE_SIZE_MB: ${NEXT_PUBLIC_STORAGE_MAX_FILE_SIZE_MB:-20}
    deploy:
      resources:
        limits:
          memory: 768M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${TENANT_SLUG}-web.rule=Host(`${TENANT_SLUG}.pagespace.ai`)"
      - "traefik.http.routers.${TENANT_SLUG}-web.entrypoints=websecure"
      - "traefik.http.routers.${TENANT_SLUG}-web.tls.certresolver=le"
      - "traefik.http.services.${TENANT_SLUG}-web.loadbalancer.server.port=3000"
    networks:
      - internal
      - traefik

  realtime:
    image: ghcr.io/2witstudios/pagespace-realtime:${IMAGE_TAG:-latest}
    restart: unless-stopped
    expose:
      - "3001"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      redis-sessions:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pagespace}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pagespace}
      PORT: "3001"
      CORS_ORIGIN: ${CORS_ORIGIN}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REDIS_SESSION_URL: redis://:${REDIS_PASSWORD}@redis-sessions:6379
      REDIS_RATE_LIMIT_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER:-pagespace}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-pagespace-users}
      REALTIME_BROADCAST_SECRET: ${REALTIME_BROADCAST_SECRET}
    deploy:
      resources:
        limits:
          memory: 256M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${TENANT_SLUG}-realtime.rule=Host(`${TENANT_SLUG}.pagespace.ai`) && PathPrefix(`/socket.io`)"
      - "traefik.http.routers.${TENANT_SLUG}-realtime.entrypoints=websecure"
      - "traefik.http.routers.${TENANT_SLUG}-realtime.tls.certresolver=le"
      - "traefik.http.routers.${TENANT_SLUG}-realtime.priority=100"
      - "traefik.http.services.${TENANT_SLUG}-realtime.loadbalancer.server.port=3001"
    networks:
      - internal
      - traefik

  cron:
    image: ghcr.io/2witstudios/pagespace-cron:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      web:
        condition: service_started
    environment:
      CRON_SECRET: ${CRON_SECRET}
      WEB_URL: http://web:3000
    deploy:
      resources:
        limits:
          memory: 32M
    networks:
      - internal

networks:
  internal:
    driver: bridge
    internal: true
  traefik:
    external: true

volumes:
  postgres_data:
  redis_data:
  redis_sessions_data:
  file_storage:
  cache_storage:
