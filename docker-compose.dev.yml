# Override for hybrid dev mode: exposes postgres port to host
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up postgres -d
#
# This adds postgres to the frontend network, which allows port
# publishing to the host (the internal network has internal: true which
# disables port publishing).

services:
  postgres:
    networks:
      - internal
      - frontend

  processor:
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      - internal
      - frontend

  clickhouse:
    networks:
      - internal
      - frontend
